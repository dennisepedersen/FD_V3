<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fielddesk – Sager</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe2ea;
      --border-strong: #c8d1db;
      --accent: #1d4ed8;
      --accent-soft: #dbeafe;
      --warning-bg: #fff7ed;
      --warning-text: #9a3412;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      --radius: 16px;
      --radius-sm: 12px;
      --topbar-h: 64px;
      --drawer-w: min(520px, 100vw);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.drawer-open {
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      display: grid;
      place-items: center;
      color: white;
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: 14px;
      color: var(--text);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .page-header {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .page-title h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 36px);
      line-height: 1.1;
    }

    .page-title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .header-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat-card {
      min-width: 120px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .stat-card .value {
      display: block;
      font-weight: 700;
      font-size: 20px;
    }

    .stat-card .label {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .toolbar {
      display: grid;
      gap: 16px;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      margin-bottom: 22px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .search-wrap {
      flex: 1 1 280px;
      position: relative;
    }

    .search-wrap input,
    .sort-select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .search-wrap input:focus,
    .sort-select:focus,
    .chip:focus,
    .project-card:focus,
    .drawer-close:focus,
    .drawer-action:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .sort-wrap {
      flex: 0 0 220px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .chip-row.hidden {
      display: none;
    }

    .chip-label,
    .sorting-hint {
      font-size: 13px;
      color: var(--muted);
    }

    .chip {
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .chip:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .sorting-hint {
      margin-left: auto;
    }

    .list-wrap {
      display: grid;
      gap: 20px;
    }

    .group-section {
      display: grid;
      gap: 12px;
    }

    .group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 2px;
    }

    .group-title strong {
      color: var(--text);
      font-size: 15px;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .project-card {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 18px;
      cursor: pointer;
      text-align: left;
      display: grid;
      gap: 14px;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    .project-card:hover {
      transform: translateY(-1px);
      border-color: #b9c5d3;
      box-shadow: var(--shadow);
    }

    .project-top {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .project-main {
      min-width: 0;
    }

    .project-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
    }

    .project-ref {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    .project-arrow {
      font-size: 20px;
      color: var(--muted);
      flex: 0 0 auto;
      line-height: 1;
    }

    .project-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .meta-pill,
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 14px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
    }

    .status-pill.status-neutral {
      background: #f8fafc;
      color: var(--text);
    }

    .status-pill.status-warning {
      background: var(--warning-bg);
      color: var(--warning-text);
      border-color: #fdba74;
    }

    .project-bottom {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      padding-top: 4px;
    }

    .info-block {
      min-width: 0;
    }

    .info-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .info-value {
      display: block;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      word-break: break-word;
    }

    .empty-state {
      padding: 26px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.6);
      color: var(--muted);
      text-align: center;
    }

    .drawer-shell {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }

    .drawer-shell.open {
      pointer-events: auto;
    }

    .drawer-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.38);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .drawer-shell.open .drawer-overlay {
      opacity: 1;
    }

    .drawer-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: var(--drawer-w);
      max-width: 100vw;
      height: 100%;
      background: var(--surface);
      box-shadow: -10px 0 40px rgba(15, 23, 42, 0.2);
      transform: translateX(100%);
      transition: transform 0.24s ease;
      display: flex;
      flex-direction: column;
    }

    .drawer-shell.open .drawer-panel {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 18px 18px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: flex-start;
    }

    .drawer-header h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .drawer-ref {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .drawer-close {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 20px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .drawer-body {
      flex: 1;
      overflow: auto;
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .drawer-section {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: var(--surface-2);
    }

    .drawer-section h3 {
      margin: 0 0 12px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .drawer-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .drawer-item {
      min-width: 0;
    }

    .drawer-item .label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .drawer-item .value {
      display: block;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      word-break: break-word;
    }

    .drawer-placeholder {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .drawer-footer {
      border-top: 1px solid var(--border);
      padding: 16px 18px;
      background: #fff;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
    }

    .drawer-action {
      min-height: 46px;
      padding: 0 18px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .drawer-secondary {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }

    .drawer-error {
      border-color: #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }

    .drawer-loading .value,
    .drawer-loading .drawer-placeholder {
      color: var(--muted);
      font-style: italic;
      font-weight: 500;
    }

    @media (max-width: 880px) {
      .project-bottom {
        grid-template-columns: 1fr;
      }

      .sorting-hint {
        margin-left: 0;
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding-inline: 14px;
      }

      .topbar {
        padding-inline: 14px;
      }

      .toolbar,
      .project-card,
      .drawer-body,
      .drawer-footer,
      .drawer-header {
        padding-inline: 14px;
      }

      .drawer-grid {
        grid-template-columns: 1fr;
      }

      .sort-wrap {
        flex: 1 1 100%;
      }

      .header-stats {
        width: 100%;
      }

      .stat-card {
        flex: 1 1 0;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">FD</div>
      <div>Fielddesk</div>
    </div>

    <div class="user-pill" id="userPill">Dennis · Entrepriseleder</div>
  </header>

  <main class="page">
    <section class="page-header">
      <div class="page-title">
        <h1 id="pageTitle">Mine sager</h1>
        <p id="pageSubtitle">Overblik først. Klik på en sag for quick info i drawer.</p>
      </div>

      <div class="header-stats" id="headerStats"></div>
    </section>

    <section class="toolbar">
      <div class="toolbar-row">
        <label class="search-wrap" aria-label="Søg i sager">
          <input id="searchInput" type="search" placeholder="Søg på navn, reference eller ansvarlig" />
        </label>

        <div class="sort-wrap">
          <select class="sort-select" id="sortSelect" aria-label="Sortér sager">
            <option value="ref_asc">Sagsnr. (lavest først)</option>
            <option value="ref_desc">Sagsnr. (højest først)</option>
            <option value="activity_desc">Sidste aktivitet (nyeste først)</option>
            <option value="activity_asc">Sidste aktivitet (ældste først)</option>
          </select>
        </div>
      </div>

      <div class="toolbar-row chip-row hidden" id="scopeChipsRow">
        <span class="chip-label">Visning:</span>
        <div id="scopeChips"></div>
        <div class="sorting-hint" id="sortingHint"></div>
      </div>
    </section>

    <section class="list-wrap" id="projectList"></section>
  </main>

  <div class="drawer-shell" id="drawerShell" aria-hidden="true">
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <aside class="drawer-panel" aria-labelledby="drawerTitle" role="dialog" aria-modal="true">
      <div class="drawer-header">
        <div>
          <h2 id="drawerTitle">Projekt</h2>
          <div class="drawer-ref" id="drawerRef">Ref: -</div>
        </div>
        <button class="drawer-close" id="drawerClose" type="button" aria-label="Luk">×</button>
      </div>

      <div class="drawer-body" id="drawerBody">
        <section class="drawer-section drawer-loading">
          <h3>Status</h3>
          <div class="drawer-grid">
            <div class="drawer-item">
              <span class="label">Status</span>
              <span class="value">Vælg en sag</span>
            </div>
            <div class="drawer-item">
              <span class="label">Sidste aktivitet</span>
              <span class="value">-</span>
            </div>
          </div>
        </section>
      </div>

      <div class="drawer-footer">
        <button type="button" class="drawer-action drawer-secondary" id="drawerCloseSecondary">Luk</button>
        <button type="button" class="drawer-action" id="openProjectBtn">Åbn sag</button>
      </div>
    </aside>
  </div>

  <script>
    /*
      FIELDESK /APP SAGSLISTE V1
      --------------------------------------------
      Denne fil er lavet som en ren HTML/CSS/JS prototype uden framework.

      MOCK MODE:
      - Kører direkte med data herunder.

      INTEGRATIONSPUNKTER TIL RIGTIG FD:
      1) Erstat currentUser med data fra /api/me
      2) Erstat projects med data fra /api/projects?... 
      3) Erstat fetchProjectDetail() med rigtig fetch mod /api/projects/:id
      4) Open project-knappen skal sende brugeren til /project/:projectId

      Noter fra jeres designbeslutninger:
      - Klik på sag = drawer først
      - Lukket vises ikke i listen
      - "Stille sag" markeres tydeligt
      - Ved flere valgte medarbejdere beholdes gruppering DEP/TKJ/... 
    */

    const currentUser = {
      id: 'dep',
      displayName: 'Dennis',
      role: 'entrepriseleder',
      roleLabel: 'Entrepriseleder',
      canSelectUsers: false,
      teamScopes: ['DEP'],
      defaultSelectedScopes: ['DEP']
    };

    // Skift til true for at se ledervisning lokalt.
    const DEMO_GROUP_LEADER = false;

    const groupLeaderDemoUser = {
      id: 'lrs',
      displayName: 'Lars',
      role: 'group_leader',
      roleLabel: 'Group leader',
      canSelectUsers: true,
      teamScopes: ['DEP', 'TKJ', 'MIK'],
      defaultSelectedScopes: ['__ALL__']
    };

    const activeUser = DEMO_GROUP_LEADER ? groupLeaderDemoUser : currentUser;

    const projects = [
      {
        id: 'p-1001',
        reference: '1001',
        projectName: 'Novo Nordisk – Service øst',
        ownerCode: 'DEP',
        ownerName: 'Dennis',
        teamLeaderName: 'Lars',
        status: 'active',
        lastActivity: '2026-03-29',
        lastHours: '2026-03-28',
        shortInfo: 'Service og opfølgning på eksisterende installation.',
        access: true
      },
      {
        id: 'p-1008',
        reference: '1008',
        projectName: 'NN – Adgangskontrol laboratorium',
        ownerCode: 'DEP',
        ownerName: 'Dennis',
        teamLeaderName: 'Lars',
        status: 'quiet',
        lastActivity: '2026-03-12',
        lastHours: '2026-03-10',
        shortInfo: 'Stille sag. Afventer næste afklaring fra kunde.',
        access: true
      },
      {
        id: 'p-1012',
        reference: '1012',
        projectName: 'Kalundborg – Video integration',
        ownerCode: 'DEP',
        ownerName: 'Dennis',
        teamLeaderName: 'Lars',
        status: 'active',
        lastActivity: '2026-03-30',
        lastHours: '2026-03-30',
        shortInfo: 'Aktiv sag med registreringer i denne uge.',
        access: true
      },
      {
        id: 'p-1002',
        reference: '1002',
        projectName: 'Hillerød – Dørmiljø vest',
        ownerCode: 'TKJ',
        ownerName: 'Thomas',
        teamLeaderName: 'Lars',
        status: 'active',
        lastActivity: '2026-03-30',
        lastHours: '2026-03-30',
        shortInfo: 'Løbende udførelse og mindre afklaringer.',
        access: true
      },
      {
        id: 'p-1011',
        reference: '1011',
        projectName: 'Pharma – Slusestyring',
        ownerCode: 'TKJ',
        ownerName: 'Thomas',
        teamLeaderName: 'Lars',
        status: 'active',
        lastActivity: '2026-03-25',
        lastHours: '2026-03-24',
        shortInfo: 'Teknisk projekt med løbende koordinering.',
        access: true
      },
      {
        id: 'p-1022',
        reference: '1022',
        projectName: 'Campus – Kabeltracé kontrol',
        ownerCode: 'MIK',
        ownerName: 'Mikkel',
        teamLeaderName: 'Lars',
        status: 'quiet',
        lastActivity: '2026-03-09',
        lastHours: '2026-03-05',
        shortInfo: 'Afventer teknisk afklaring før næste træk.',
        access: true
      },
      {
        id: 'p-1035',
        reference: '1035',
        projectName: 'Intern test – lukket sag',
        ownerCode: 'DEP',
        ownerName: 'Dennis',
        teamLeaderName: 'Lars',
        status: 'closed',
        lastActivity: '2026-02-10',
        lastHours: '2026-02-08',
        shortInfo: 'Skal ikke vises i listen.',
        access: true
      }
    ];

    const state = {
      search: '',
      sort: 'ref_asc',
      selectedScopes: [...activeUser.defaultSelectedScopes],
      drawerProjectId: null
    };

    const els = {
      userPill: document.getElementById('userPill'),
      pageTitle: document.getElementById('pageTitle'),
      pageSubtitle: document.getElementById('pageSubtitle'),
      searchInput: document.getElementById('searchInput'),
      sortSelect: document.getElementById('sortSelect'),
      scopeChipsRow: document.getElementById('scopeChipsRow'),
      scopeChips: document.getElementById('scopeChips'),
      sortingHint: document.getElementById('sortingHint'),
      projectList: document.getElementById('projectList'),
      headerStats: document.getElementById('headerStats'),
      drawerShell: document.getElementById('drawerShell'),
      drawerOverlay: document.getElementById('drawerOverlay'),
      drawerClose: document.getElementById('drawerClose'),
      drawerCloseSecondary: document.getElementById('drawerCloseSecondary'),
      drawerTitle: document.getElementById('drawerTitle'),
      drawerRef: document.getElementById('drawerRef'),
      drawerBody: document.getElementById('drawerBody'),
      openProjectBtn: document.getElementById('openProjectBtn')
    };

    function formatDate(dateString) {
      if (!dateString) return '-';
      const date = new Date(dateString + 'T00:00:00');
      return new Intl.DateTimeFormat('da-DK').format(date);
    }

    function statusText(status) {
      if (status === 'quiet') return 'Stille';
      if (status === 'closed') return 'Lukket';
      return 'Aktiv';
    }

    function statusClass(status) {
      if (status === 'quiet') return 'status-warning';
      return 'status-neutral';
    }

    function buildVisibleProjects() {
      const scopeSelected = state.selectedScopes.includes('__ALL__')
        ? activeUser.teamScopes
        : state.selectedScopes;

      const query = state.search.trim().toLowerCase();

      return projects
        .filter(project => project.status !== 'closed')
        .filter(project => {
          if (!activeUser.canSelectUsers) {
            return project.ownerCode === activeUser.teamScopes[0];
          }
          return scopeSelected.includes(project.ownerCode);
        })
        .filter(project => {
          if (!query) return true;
          const haystack = [
            project.projectName,
            project.reference,
            project.ownerCode,
            project.ownerName,
            project.teamLeaderName
          ].join(' ').toLowerCase();
          return haystack.includes(query);
        });
    }

    function sortProjects(list) {
      const sorted = [...list];
      sorted.sort((a, b) => {
        if (state.sort === 'ref_desc') {
          return b.reference.localeCompare(a.reference, 'da', { numeric: true, sensitivity: 'base' });
        }
        if (state.sort === 'activity_desc') {
          return new Date(b.lastActivity) - new Date(a.lastActivity);
        }
        if (state.sort === 'activity_asc') {
          return new Date(a.lastActivity) - new Date(b.lastActivity);
        }
        return a.reference.localeCompare(b.reference, 'da', { numeric: true, sensitivity: 'base' });
      });
      return sorted;
    }

    function groupProjects(list) {
      if (!activeUser.canSelectUsers) {
        return [{ key: activeUser.teamScopes[0], label: activeUser.displayName, projects: sortProjects(list) }];
      }

      const selectedCodes = state.selectedScopes.includes('__ALL__')
        ? [...activeUser.teamScopes]
        : [...state.selectedScopes].sort((a, b) => a.localeCompare(b, 'da', { sensitivity: 'base' }));

      if (selectedCodes.length <= 1) {
        const code = selectedCodes[0] || activeUser.teamScopes[0];
        const label = list.find(p => p.ownerCode === code)?.ownerName || code;
        return [{ key: code, label, projects: sortProjects(list) }];
      }

      return selectedCodes.map(code => {
        const ownerProjects = list.filter(project => project.ownerCode === code);
        const label = ownerProjects[0]?.ownerName || code;
        return {
          key: code,
          label,
          projects: sortProjects(ownerProjects)
        };
      }).filter(group => group.projects.length > 0);
    }

    function renderStats(visibleProjects) {
      const total = visibleProjects.length;
      const quiet = visibleProjects.filter(project => project.status === 'quiet').length;
      const active = visibleProjects.filter(project => project.status === 'active').length;

      els.headerStats.innerHTML = `
        <div class="stat-card">
          <span class="value">${total}</span>
          <span class="label">Viste sager</span>
        </div>
        <div class="stat-card">
          <span class="value">${active}</span>
          <span class="label">Aktive</span>
        </div>
        <div class="stat-card">
          <span class="value">${quiet}</span>
          <span class="label">Stille</span>
        </div>
      `;
    }

    function renderScopeChips() {
      els.userPill.textContent = `${activeUser.displayName} · ${activeUser.roleLabel}`;
      els.scopeChipsRow.classList.toggle('hidden', !activeUser.canSelectUsers);

      if (!activeUser.canSelectUsers) {
        els.pageTitle.textContent = 'Mine sager';
        els.pageSubtitle.textContent = 'Overblik først. Klik på en sag for quick info i drawer.';
        return;
      }

      els.pageTitle.textContent = 'Sager';
      els.pageSubtitle.textContent = 'Filtrér på medarbejder og klik på en sag for quick info i drawer.';

      const currentIsAll = state.selectedScopes.includes('__ALL__');
      const chips = [`
        <button type="button" class="chip ${currentIsAll ? 'active' : ''}" data-scope="__ALL__">Vis alle</button>
      `];

      activeUser.teamScopes.forEach(code => {
        const active = !currentIsAll && state.selectedScopes.includes(code);
        chips.push(`<button type="button" class="chip ${active ? 'active' : ''}" data-scope="${code}">${code}</button>`);
      });

      els.scopeChips.innerHTML = chips.join('');

      els.scopeChips.querySelectorAll('[data-scope]').forEach(button => {
        button.addEventListener('click', () => {
          toggleScope(button.dataset.scope);
        });
      });
    }

    function toggleScope(scope) {
      if (scope === '__ALL__') {
        state.selectedScopes = ['__ALL__'];
        render();
        return;
      }

      const current = new Set(state.selectedScopes.includes('__ALL__') ? [] : state.selectedScopes);

      if (current.has(scope)) {
        current.delete(scope);
      } else {
        current.add(scope);
      }

      if (current.size === 0) {
        current.add(scope);
      }

      state.selectedScopes = [...current].sort((a, b) => a.localeCompare(b, 'da', { sensitivity: 'base' }));
      render();
    }

    function renderList() {
      const visibleProjects = buildVisibleProjects();
      renderStats(visibleProjects);

      const groups = groupProjects(visibleProjects);
      const showGrouped = activeUser.canSelectUsers && groups.length > 1;

      if (!visibleProjects.length) {
        els.projectList.innerHTML = `
          <div class="empty-state">
            Ingen sager matcher din visning lige nu.
          </div>
        `;
        els.sortingHint.textContent = '';
        return;
      }

      els.sortingHint.textContent = activeUser.canSelectUsers
        ? showGrouped
          ? `Grupperet efter: medarbejder · Sorteret efter: ${sortLabel(state.sort)}`
          : `Sorteret efter: ${sortLabel(state.sort)}`
        : '';

      const html = groups.map(group => {
        const cards = group.projects.map(project => renderProjectCard(project)).join('');
        if (showGrouped) {
          return `
            <section class="group-section">
              <h2 class="group-title">
                <strong>${escapeHtml(group.key)}</strong>
                <span>${escapeHtml(group.label)}</span>
              </h2>
              ${cards}
            </section>
          `;
        }
        return `<section class="group-section">${cards}</section>`;
      }).join('');

      els.projectList.innerHTML = html;

      els.projectList.querySelectorAll('[data-project-id]').forEach(button => {
        button.addEventListener('click', () => openDrawer(button.dataset.projectId));
      });
    }

    function renderProjectCard(project) {
      const showOwner = activeUser.canSelectUsers;
      return `
        <button type="button" class="project-card" data-project-id="${escapeHtml(project.id)}">
          <div class="project-top">
            <div class="project-main">
              <h3 class="project-title">${escapeHtml(project.projectName)}</h3>
              <div class="project-ref">Ref: ${escapeHtml(project.reference)}</div>
            </div>
            <div class="project-arrow">›</div>
          </div>

          <div class="project-meta">
            <span class="status-pill ${statusClass(project.status)}">${statusText(project.status)}</span>
            ${project.status === 'quiet' ? '<span class="meta-pill">Stille sag</span>' : ''}
          </div>

          <div class="project-bottom">
            ${showOwner ? `
              <div class="info-block">
                <span class="info-label">Sagsansvarlig</span>
                <span class="info-value">${escapeHtml(project.ownerName)}</span>
              </div>
            ` : ''}
            <div class="info-block">
              <span class="info-label">Sidste aktivitet</span>
              <span class="info-value">${formatDate(project.lastActivity)}</span>
            </div>
            <div class="info-block">
              <span class="info-label">Seneste timer</span>
              <span class="info-value">${formatDate(project.lastHours)}</span>
            </div>
            <div class="info-block">
              <span class="info-label">Teamleder</span>
              <span class="info-value">${escapeHtml(project.teamLeaderName)}</span>
            </div>
          </div>
        </button>
      `;
    }

    function sortLabel(sort) {
      if (sort === 'ref_desc') return 'sagsnr. (højest først)';
      if (sort === 'activity_desc') return 'sidste aktivitet (nyeste først)';
      if (sort === 'activity_asc') return 'sidste aktivitet (ældste først)';
      return 'sagsnr. (lavest først)';
    }

    async function openDrawer(projectId) {
      state.drawerProjectId = projectId;
      const project = projects.find(item => item.id === projectId);

      els.drawerTitle.textContent = project?.projectName || 'Sag';
      els.drawerRef.textContent = `Ref: ${project?.reference || '-'}`;
      els.openProjectBtn.disabled = false;
      els.drawerBody.innerHTML = `
        <section class="drawer-section drawer-loading">
          <h3>Henter</h3>
          <p class="drawer-placeholder">Henter projektinfo…</p>
        </section>
      `;

      els.drawerShell.classList.add('open');
      els.drawerShell.setAttribute('aria-hidden', 'false');
      document.body.classList.add('drawer-open');

      try {
        const detail = await fetchProjectDetail(projectId);
        renderDrawer(detail);
      } catch (error) {
        renderDrawerError(error);
      }
    }

    function closeDrawer() {
      state.drawerProjectId = null;
      els.drawerShell.classList.remove('open');
      els.drawerShell.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('drawer-open');
    }

    async function fetchProjectDetail(projectId) {
      // MOCK. Erstat med rigtig fetch mod /api/projects/:projectId
      // Rigtig integration kunne fx være:
      // const response = await authFetch(`/api/projects/${encodeURIComponent(projectId)}`);
      // if (response.status === 404) throw new Error('not_found');
      // if (response.status === 401 || response.status === 403) throw new Error('auth_error');
      // if (!response.ok) throw new Error('generic_error');
      // return response.json();

      await new Promise(resolve => setTimeout(resolve, 220));
      const project = projects.find(item => item.id === projectId);
      if (!project) throw new Error('not_found');
      if (!project.access) throw new Error('not_found');

      return {
        ...project,
        description: project.shortInfo,
        customerName: 'Novo Nordisk',
        address: 'Eksempelvej 12, 3400 Hillerød',
        quickNote: project.status === 'quiet'
          ? 'Sagen er markeret som stille. Den bør være let at spotte i overblikket.'
          : 'Aktiv sag med adgang til fuld detaljeside ved behov.'
      };
    }

    function renderDrawer(detail) {
      const statusPill = `<span class="status-pill ${statusClass(detail.status)}">${statusText(detail.status)}</span>`;

      els.drawerBody.innerHTML = `
        <section class="drawer-section">
          <h3>Overblik</h3>
          <div class="drawer-grid">
            <div class="drawer-item">
              <span class="label">Status</span>
              <span class="value">${statusPill}</span>
            </div>
            <div class="drawer-item">
              <span class="label">Sidste aktivitet</span>
              <span class="value">${formatDate(detail.lastActivity)}</span>
            </div>
            <div class="drawer-item">
              <span class="label">Sagsansvarlig</span>
              <span class="value">${escapeHtml(detail.ownerName)}</span>
            </div>
            <div class="drawer-item">
              <span class="label">Teamleder</span>
              <span class="value">${escapeHtml(detail.teamLeaderName || '-')}</span>
            </div>
            <div class="drawer-item">
              <span class="label">Seneste timer</span>
              <span class="value">${formatDate(detail.lastHours)}</span>
            </div>
            <div class="drawer-item">
              <span class="label">Kunde</span>
              <span class="value">${escapeHtml(detail.customerName || '-')}</span>
            </div>
          </div>
        </section>

        <section class="drawer-section">
          <h3>Quick info</h3>
          <p class="drawer-placeholder">${escapeHtml(detail.description || 'Ingen beskrivelse endnu.')}</p>
        </section>

        <section class="drawer-section">
          <h3>Placering</h3>
          <div class="drawer-item">
            <span class="label">Adresse</span>
            <span class="value">${escapeHtml(detail.address || '-')}</span>
          </div>
        </section>

        <section class="drawer-section">
          <h3>Notat</h3>
          <p class="drawer-placeholder">${escapeHtml(detail.quickNote || 'Ingen hurtig note endnu.')}</p>
        </section>
      `;
    }

    function renderDrawerError(error) {
      let title = 'Der opstod en fejl';
      let text = 'Projektinfo kunne ikke hentes lige nu.';

      if (error?.message === 'not_found') {
        title = 'Sagen kunne ikke åbnes';
        text = 'Du har ikke adgang til sagen, eller den findes ikke længere.';
      }

      if (error?.message === 'auth_error') {
        title = 'Adgang udløbet';
        text = 'Din session er udløbet. Du skal logge ind igen.';
      }

      els.drawerBody.innerHTML = `
        <section class="drawer-section drawer-error">
          <h3>${escapeHtml(title)}</h3>
          <p class="drawer-placeholder">${escapeHtml(text)}</p>
        </section>
      `;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function render() {
      renderScopeChips();
      renderList();
    }

    els.searchInput.addEventListener('input', event => {
      state.search = event.target.value;
      render();
    });

    els.sortSelect.addEventListener('change', event => {
      state.sort = event.target.value;
      render();
    });

    els.drawerOverlay.addEventListener('click', closeDrawer);
    els.drawerClose.addEventListener('click', closeDrawer);
    els.drawerCloseSecondary.addEventListener('click', closeDrawer);

    els.openProjectBtn.addEventListener('click', () => {
      if (!state.drawerProjectId) return;
      window.location.href = `/project/${encodeURIComponent(state.drawerProjectId)}`;
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && els.drawerShell.classList.contains('open')) {
        closeDrawer();
      }
    });

    render();
  </script>
</body>
</html>
