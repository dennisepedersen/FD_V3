<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fielddesk Login</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 480px;
      margin: 48px auto;
      padding: 0 16px;
    }

    form {
      display: grid;
      gap: 12px;
    }

    input,
    button {
      font: inherit;
      padding: 10px 12px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f5f5f5;
      padding: 12px;
    }
  </style>
</head>
<body data-page="login">
  <h1>Log ind</h1>
  <form id="loginForm">
    <label>
      Brugernavn
      <input id="login" name="login" type="text" autocomplete="username" required maxlength="4" placeholder="dep">
    </label>
    <label>
      Adgangskode
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Log ind</button>
  </form>
  <pre id="errorBox" hidden></pre>
  <script src="/tenant/auth.js"></script>
</body>
</html>
